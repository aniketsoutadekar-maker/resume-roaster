<!DOCTYPE html>
<html>
<head>
  <title>Roast My Resume 🔥</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: auto; }
    textarea { width: 100%; height: 150px; }
    button { margin-top: 10px; padding: 10px; }
    pre { background: #f4f4f4; padding: 10px; }
  </style>
</head>
<body>

<h1>Roast My Resume 🔥</h1>

<textarea id="resume" placeholder="Paste your resume here"></textarea>

<button onclick="roast()">Roast 🔥</button>

<pre id="output"></pre>

<script>
async function roast() {
  const resume = document.getElementById("resume").value;

  document.getElementById("output").innerText = "Roasting... 🔥";

  const res = await fetch("/api/roast", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ resume })
  });

  const data = await res.json();
  document.getElementById("output").innerText = data.roast;
}
</script>

</body>
</html>
